<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>React Sem Instalar</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{
    margin: 0;
    box-sizing: border-box;
    padding: 0;
    
  }
  h1{
    font-family: Arial;
  }
  body{
    place-items: center;
    min-height: 100dvh;
    display: grid;
    background: 
    radial-gradient(circle at top left,#00ffff55,transparent 50%),
    radial-gradient(circle at bottom right,#00ffff55,transparent 30%),
    linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  }
  #root{
    text-align: center;
    color: white;
    background: linear-gradient(rgb(1, 1, 42) 30%,rgb(34, 0, 57) 50%);
    padding: 20px;
    border: 4px solid white;
    border-radius: 10px;
    box-shadow: 0px 0px 1000px 90px rgb(127, 1, 49);
  }
  button{
    margin: 20px;
    width: 40px;
    height: 40px;
    font-size: 40px;
    text-align: center;
    background-color: #0f0c29;
    color: white;
    font-family: Arial, Helvetica, sans-serif;
    border-style: hidden;
    border-radius: 7px;
    transition: 0.3s all;
    border: 2px solid whitesmoke;
    
  }
  button:hover{
    opacity: 0.5;
    cursor: pointer;
  }
  p{
    margin-top: 45px;
    font-size: 90px;
    font-family: Arial;
    font-weight: 100px;
    color: rgb(255, 254, 254);
    text-shadow: 5px 5px 2px rgb(127, 1, 49)
    ;
  }
</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">
const root = ReactDOM.createRoot(document.getElementById("root"))


 function App(){
  const[numero,setNumero] = React.useState(0)
  return (

  <div>
    <h1>Contador</h1>
    <p>{numero}</p>
    <button onClick= {()=> setNumero(numero + 1)}>
      +
    </button>
    <button onClick= {()=> setNumero(numero - 1)}>
      -
    </button>
  </div>
)
}
root.render(<App />)

</script>

</body>
</html>
